<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TabPilot 활동 관리</title>
  </head>
  <body>
    <main class="activity">
      <header>
        <div>
          <p class="eyebrow">TABPILOT</p>
          <h1>전체 탭 관리</h1>
          <p>
            열린 탭을 검색하고 보호·휴면·재활성화 상태를 한곳에서 관리합니다.
          </p>
        </div>
        <div class="header-actions">
          <button id="refresh" type="button">새로고침</button>
          <button id="open-options" type="button">설정</button>
        </div>
      </header>

      <section class="summary" aria-label="활동 요약">
        <article>
          <strong id="total-count">—</strong><span>전체 탭</span>
        </article>
        <article>
          <strong id="candidate-count">—</strong><span>정리 후보</span>
        </article>
        <article>
          <strong id="sleeping-count">—</strong><span>휴면 탭</span>
        </article>
        <article>
          <strong id="protected-count">—</strong><span>보호 탭</span>
        </article>
      </section>

      <section class="panel tab-manager">
        <div class="panel-heading">
          <div>
            <p class="label">ALL TABS</p>
            <h2>열린 탭</h2>
          </div>
          <span id="visible-count" class="visible-count"></span>
        </div>
        <div class="tab-tools">
          <label class="search-field">
            <span class="sr-only">탭 검색</span>
            <input
              id="tab-search"
              type="search"
              placeholder="탭 제목이나 도메인 검색"
              autocomplete="off"
            />
          </label>
          <div id="tab-filters" class="tab-filters" aria-label="탭 상태 필터">
            <button type="button" class="selected" data-filter="all">
              전체
            </button>
            <button type="button" data-filter="candidate">정리 후보</button>
            <button type="button" data-filter="protected">보호됨</button>
            <button type="button" data-filter="sleeping">휴면</button>
            <button type="button" data-filter="active">활성</button>
          </div>
        </div>
        <ul id="all-tabs-list" class="all-tabs-list"></ul>
      </section>

      <div class="columns">
        <section class="panel">
          <div class="panel-heading">
            <div>
              <p class="label">SLEEPING</p>
              <h2>휴면 중인 탭</h2>
            </div>
          </div>
          <ul id="sleeping-list"></ul>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <div>
              <p class="label">HISTORY</p>
              <h2>정리 기록 <span id="history-count"></span></h2>
            </div>
            <button id="clear-history" class="danger" type="button">
              기록 삭제
            </button>
          </div>
          <ul id="history-list"></ul>
        </section>
      </div>
      <p id="status" class="status" role="status"></p>
    </main>
    <script type="module" src="/src/activity/activity.ts"></script>
  </body>
</html>
